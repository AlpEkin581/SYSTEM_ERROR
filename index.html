<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_DESTRUCT_SYSTEM</title>
    <style>
        /* HACKER UI - FULL BUTTON CONTROL */
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* Metin seçimini engeller, tıklamayı bozmaz */
        }

        #desktop {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #001a00 0%, #000 100%);
            display: flex;
            flex-direction: column;
            padding: 60px;
            gap: 40px;
        }

        /* DEV İKONLAR (GERÇEK BUTONLAR) */
        .hacker-icon {
            background: rgba(0, 30, 0, 0.3);
            border: 2px solid #030;
            color: #0f0;
            width: 180px;
            padding: 25px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
            border-radius: 8px;
        }

        .hacker-icon:hover {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            box-shadow: 0 0 25px #0f0;
            transform: scale(1.02);
        }

        .hacker-icon:active { transform: scale(0.9); }

        .emoji { font-size: 70px; pointer-events: none; }
        .label { font-size: 16px; font-weight: bold; margin-top: 15px; pointer-events: none; text-shadow: 0 0 5px #0f0; }

        /* PENCERELER */
        .window {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 3px solid #0f0;
            padding: 25px;
            z-index: 9999;
            min-width: 380px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.4);
        }

        .win-header {
            background: #0f0; color: #000;
            font-weight: bold; padding: 8px;
            text-align: center; margin: -25px -25px 20px -25px;
        }

        input {
            background: #000; border: 1px solid #0f0;
            color: #0f0; padding: 15px; width: 100%;
            box-sizing: border-box; margin-bottom: 20px;
            font-size: 18px; outline: none; font-family: monospace;
        }

        .exe-btn {
            background: #0f0; color: #000;
            border: none; padding: 15px; width: 100%;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* PROGRESS BAR */
        .progress-container { width: 100%; height: 25px; background: #001100; border: 1px solid #0f0; margin-bottom: 15px; }
        #bar { width: 0%; height: 100%; background: #0f0; }

        .hidden { display: none !important; }
        .output-line { border-bottom: 1px solid #020; padding: 10px 0; font-size: 14px; }
        .output-line:hover { color: #fff; background: rgba(0, 255, 0, 0.05); cursor: pointer; }
        .close-btn { color: #f00; cursor: pointer; display: block; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="desktop">
        <button class="hacker-icon" onclick="openFolder()">
            <span class="emoji">📁</span>
            <span class="label">NOTLAR.TXT</span>
        </button>

        <button class="hacker-icon" onclick="openTerminal()">
            <span class="emoji">📟</span>
            <span class="label">TERMİNAL</span>
        </button>

        <button class="hacker-icon" onclick="startFinal()">
            <span class="emoji">⚠️</span>
            <span class="label">SİSTEM.EXE</span>
        </button>
    </div>

    <div id="msg-box" class="window hidden">
        <div class="win-header">[SİSTEM_UYARISI]</div>
        <p id="msg-text" style="text-align:center; font-size: 18px;"></p>
        <button class="exe-btn" onclick="document.getElementById('msg-box').classList.add('hidden')">ANLADIM</button>
    </div>

    <div id="loading-box" class="window hidden">
        <div class="win-header">[DECRYPTING_FILES]</div>
        <div class="progress-container"><div id="bar"></div></div>
        <p style="text-align: center; font-size: 12px;">Veriler eski kurbanlardan toplanıyor...</p>
    </div>

    <div id="terminal-window" class="window hidden">
        <div class="win-header">[ROOT_TERMINAL_V2]</div>
        <input type="text" id="code-input" placeholder="KOD_GIRINIZ..." autocomplete="off">
        <button class="exe-btn" onclick="checkCode()">YÜRÜT (EXECUTE)</button>
        <div id="terminal-output" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
        <span class="close-btn" onclick="document.getElementById('terminal-window').classList.add('hidden')">[OTURUMU_KAPAT]</span>
    </div>

    <script>
        const FLUX_KODU = "FLUX-666-PIZZA";
        const SABIR_KODU = "SABIRLI-VARIS-99";
        let timer;

        function openFolder() {
            const mText = document.getElementById('msg-text');
            const lBox = document.getElementById('loading-box');
            const bar = document.getElementById('bar');
            
            mText.innerText = "Sistem derinlikleri taranıyor... Eski kayıtlar (Kurban_01) analiz ediliyor.";
            document.getElementById('msg-box').classList.remove('hidden');
            lBox.classList.remove('hidden');
            
            let w = 0;
            clearInterval(timer);
            timer = setInterval(() => {
                w++;
                bar.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(timer);
                    mText.innerText = "ERİŞİM KODU ÇÖZÜLDÜ: " + SABIR_KODU;
                    lBox.classList.add('hidden');
                }
            }, 600); // 1 Dakika civarı
        }

        function openTerminal() { document.getElementById('terminal-window').classList.remove('hidden'); }

        function startFinal() {
            let choice = prompt("Vârisim olup bu karanlık sistemi devralacak mısın? (EVET/HAYIR)");
            if(choice?.toUpperCase() === "EVET") {
                document.body.innerHTML = `
                    <div style="background:#000; color:#0f0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:monospace;">
                        <h1 style="font-size:50px; text-shadow: 0 0 20px #0f0;">[YETKİ_DEVREDİLDİ]</h1>
                        <p style="font-size:25px;">YENİ YÖNETİCİ KODUN: <b style="color:white; border: 1px solid #0f0; padding: 5px;">${FLUX_KODU}</b></p>
                        <button onclick="location.reload()" style="background:#0f0; border:none; padding:15px; cursor:pointer; font-weight:bold; margin-top:30px;">ANA DİZİNE DÖN</button>
                    </div>`;
            }
        }

        function checkCode() {
            const inp = document.getElementById('code-input').value;
            const out = document.getElementById('terminal-output');
            
            if(inp === FLUX_KODU) {
                out.innerHTML = `
                    <p style="color:yellow; font-weight:bold;">[ERİŞİM ONAYLANDI - ESKİ KAYITLAR]</p>
                    <div class="output-line" onclick="alert('Soğuk pizza yemek hapsolmaktan zordu... Kurban_01')">📄 Kurban_01.txt (Arşiv)</div>
                    <div class="output-line" onclick="alert('Mors Mesajı: .... . .-.. .--. (YARDIM)')">📻 Sinyal_Kaydi_00.wav</div>
                `;
            } else if(inp === SABIR_KODU) {
                out.innerHTML = `
                    <p style="color:cyan; font-weight:bold;">[ÖZEL ERİŞİM - YENİ KAYITLAR]</p>
                    <div class="output-line" onclick="alert('BORÇ: 0.00$ - Not: Abi bu siparişi 100 yıl önce vermiştin, pizza fosilleşmiş.')">🍕 Pizza_Faturasi_1924.pdf</div>
                    <div class="output-line" onclick="alert('Sistemin asıl sahibi aslında sendin... Hafızanı mı kaybettin?')">💾 Kimlik_Dosyasi.dat</div>
                `;
            } else {
                out.innerHTML = "<p style='color:red;'>[HATA]: GEÇERSİZ ERİŞİM KODU.</p>";
            }
        }
    </script>
</body>
</html>
