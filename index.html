<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; user-select: none; }
        
        #desktop { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #001a00 0%, #000 100%); 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            grid-auto-rows: min-content; padding: 40px; gap: 25px; box-sizing: border-box;
        }
        
        .hacker-icon { 
            background: rgba(0, 30, 0, 0.2); border: 2px solid #030; color: #0f0; padding: 20px; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            transition: 0.2s; border-radius: 10px; outline: none; width: 100%;
        }
        .hacker-icon:hover { background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; }
        .emoji { font-size: 50px; pointer-events: none; }
        .label { font-size: 13px; font-weight: bold; margin-top: 10px; pointer-events: none; }

        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid #0f0; padding: 20px; z-index: 100; width: 450px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.4); box-sizing: border-box; }
        .win-header { background: #0f0; color: #000; font-weight: bold; padding: 8px; text-align: center; margin: -20px -20px 15px -20px; }
        .hidden { display: none !important; }

        .exe-btn { background: #0f0; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Courier New'; }
        .output-line { border-bottom: 1px solid #020; padding: 10px; font-size: 13px; cursor: pointer; color: #aaa; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 100%; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <div id="desktop">
        <button class="hacker-icon" onclick="openFolder()"><span class="emoji">📁</span><span class="label">NOTLAR.TXT</span></button>
        <button class="hacker-icon" onclick="openWin('mail-window')"><span class="emoji">📧</span><span class="label">E-POSTA</span></button>
        <button class="hacker-icon" onclick="openWin('pizza-window')"><span class="emoji">🍕</span><span class="label">PİZZACI</span></button>
        <button class="hacker-icon" onclick="openWin('terminal-window')"><span class="emoji">📟</span><span class="label">TERMİNAL</span></button>
        <button class="hacker-icon" onclick="startSystemCheck()"><span class="emoji">⚠️</span><span class="label">SİSTEM.EXE</span></button>
        <button class="hacker-icon" onclick="openWin('antivirus-window')"><span class="emoji">🛡️</span><span class="label">ANTİVİRÜS</span></button>
    </div>

    <div id="terminal-window" class="window hidden">
        <div class="win-header">[ROOT_TERMINAL_V15.5]</div>
        <p style="font-size: 10px; color: #080;">Sponsorumuz için 'SPONSOR' yazın.</p>
        <input type="text" id="code-input" placeholder="KOMUT GİRİNİZ...">
        <button class="exe-btn" onclick="checkCode()">YÜRÜT</button>
        <div id="terminal-output" style="height:180px; overflow:auto; border-top:1px solid #030; margin-top:10px;"></div>
        <button class="exe-btn" onclick="closeWin('terminal-window')" style="background:#300; color:#f00;">LOGOUT</button>
    </div>

    <div id="antivirus-window" class="window hidden">
        <div class="win-header">[SYSTEM_ERROR_REPORT]</div>
        <div style="text-align:center;">
            <p style="color: #ff0; font-weight: bold;">⚠️ BİLİNMEYEN DOSYA TESPİT EDİLDİ</p>
            <p style="font-size: 13px;">Dosya: Kesinlikle-Virüs.exe</p>
            <button class="exe-btn" onclick="window.location.href='https://www.youtube.com/watch?v=dQw4w9WgXcQ'">İNCELE VE TEMİZLE</button>
            <button class="exe-btn" onclick="closeWin('antivirus-window')" style="background:#111; color:#555; font-size: 10px; border: 1px solid #222;">YOK SAY</button>
        </div>
    </div>

    <div id="pizza-window" class="window hidden">
        <div class="win-header">[PIZZA_TIME]</div>
        <button class="exe-btn" onclick="startDelivery()">SİPARİŞ VER</button>
        <div id="delivery-tracking" class="hidden">
            <p>Durum: <span id="current-century" style="color:yellow;">20. Yüzyıl</span></p>
        </div>
        <button class="exe-btn" onclick="closeWin('pizza-window')" style="background:#333;">KAPAT</button>
    </div>

    <script>
        const KOD_2 = "SABIRLI-VARIS-99";
        const KOD_SIL = "DESTRUCT_ALL_FILES";

        function openWin(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeWin(id) { document.getElementById(id).classList.add('hidden'); }

        function checkCode() {
            const inp = document.getElementById('code-input').value.trim().toUpperCase();
            const out = document.getElementById('terminal-output');
            
            if(inp === "SPONSOR") {
                out.innerHTML += `<p style="color:cyan;">[!] Sponsor yönlendirmesi başlatılıyor... Şalgamlar hazır!</p>`;
                // İZİNSİZ AÇMA (YENİ SEKMEDE)
                window.open("https://youtu.be/v-d1yI2kW_c?si=Emohwv5fp0Hd_6yw", "_blank");
            } else if(inp === "HAKKIMIZDA") {
                out.innerHTML += `
                    <div style="border:1px solid #0f0; padding:10px; margin-top:5px;">
                        <p>Geliştirici: Alp Terminal Master</p>
                        <p>Durum: %0 Akıl / %100 Hacker</p>
                        <p>Sponsor: Hacının Şalgamı (İçince yerinde duramıyor)</p>
                    </div>`;
            } else if(inp === KOD_SIL) {
                document.body.innerHTML = "<h1 style='color:black; text-align:center; margin-top:20%;'>SİSTEM SİLİNDİ.</h1>";
                document.body.style.backgroundColor = "white";
            } else {
                out.innerHTML += `<p style="color:red;">[${inp}] komutu anlaşılamadı.</p>`;
            }
            out.scrollTop = out.scrollHeight;
        }

        // Diğer fonksiyonlar (Pizza ve Boss) kodun devamında aynen çalışacaktır.
        function startDelivery() {
            document.getElementById('delivery-tracking').classList.remove('hidden');
            let i = 0;
            const cents = ["20. Yüzyıl", "21. Yüzyıl", "22. Yüzyıl", "TESLİM EDİLDİ"];
            setInterval(() => { if(i<cents.length) { document.getElementById('current-century').innerText = cents[i]; i++; } }, 3000);
        }
        
        function openFolder() {
            alert("ERİŞİM KODU: " + KOD_2);
        }

        function startSystemCheck() {
            if(prompt("Vâris misin?")?.toUpperCase() === "EVET") alert("Kod: FLUX-666-PIZZA");
        }
    </script>
</body>
</html>
