<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_TROLL_V12</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #0f0; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; user-select: none; }
        
        #desktop { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #001a00 0%, #000 100%); 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            padding: 40px; gap: 25px; box-sizing: border-box;
        }
        
        .hacker-icon { 
            background: rgba(0, 30, 0, 0.3); border: 2px solid #030; 
            color: #0f0; padding: 20px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; 
            transition: 0.2s; border-radius: 10px; outline: none; width: 100%;
        }
        .hacker-icon:hover { background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; }
        .emoji { font-size: 50px; pointer-events: none; }
        .label { font-size: 13px; font-weight: bold; margin-top: 10px; pointer-events: none; }

        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid #0f0; padding: 20px; z-index: 100; width: 450px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.4); box-sizing: border-box; }
        .win-header { background: #0f0; color: #000; font-weight: bold; padding: 8px; text-align: center; margin: -20px -20px 15px -20px; }
        .hidden { display: none !important; }

        /* PİZZACI SEÇENEKLERİ */
        .pizza-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .topping-check { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; }
        
        .progress-container { width: 100%; height: 25px; background: #001100; border: 1px solid #0f0; margin: 15px 0; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #0f0; }

        .output-line { border-bottom: 1px solid #020; padding: 10px; font-size: 13px; cursor: pointer; color: #aaa; }
        .output-line:hover { background: #010; color: #0f0; }

        .exe-btn { background: #0f0; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 100%; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <div id="desktop">
        <button class="hacker-icon" onclick="openFolder()">
            <span class="emoji">📁</span>
            <span class="label">NOTLAR.TXT</span>
        </button>
        <button class="hacker-icon" onclick="document.getElementById('mail-window').classList.remove('hidden')">
            <span class="emoji">📧</span>
            <span class="label">E-POSTA</span>
        </button>
        <button class="hacker-icon" onclick="document.getElementById('pizza-window').classList.remove('hidden')">
            <span class="emoji">🍕</span>
            <span class="label">PİZZACI</span>
        </button>
        <button class="hacker-icon" onclick="document.getElementById('terminal-window').classList.remove('hidden')">
            <span class="emoji">📟</span>
            <span class="label">TERMİNAL</span>
        </button>
        <button class="hacker-icon" onclick="startSystemCheck()">
            <span class="emoji">⚠️</span>
            <span class="label">SİSTEM.EXE</span>
        </button>
        <button class="hacker-icon" onclick="document.getElementById('antivirus-window').classList.remove('hidden')">
            <span class="emoji">🛡️</span>
            <span class="label">ANTİVİRÜS</span>
        </button>
    </div>

    <div id="pizza-window" class="window hidden">
        <div class="win-header">[PİZZA_BUILDER_V2]</div>
        <div class="pizza-options">
            <label class="topping-check"><input type="checkbox" class="t-opt" value="Fosil Sucuk"> Fosil Sucuk 🥓</label>
            <label class="topping-check"><input type="checkbox" class="t-opt" value="Küflü Peynir"> Küflü Peynir 🧀</label>
            <label class="topping-check"><input type="checkbox" class="t-opt" value="Antik Zeytin"> Antik Zeytin 🫒</label>
            <label class="topping-check"><input type="checkbox" class="t-opt" value="Ronaldo'nun Terli Forması"> Ronaldo'nun Forması ⚽</label>
        </div>
        <button class="exe-btn" onclick="orderPizza()">SİPARİŞİ TAMAMLA</button>
        <button class="exe-btn" onclick="this.parentElement.classList.add('hidden')" style="background:#300; color:#f00;">VAZGEÇ</button>
    </div>

    <div id="antivirus-window" class="window hidden">
        <div class="win-header">[SECURITY_SCANNER]</div>
        <p style="text-align:center;">Sistemde 1 adet şüpheli dosya bulundu.</p>
        <button class="exe-btn" onclick="rickroll()">TEHDİDİ TEMİZLE</button>
        <button class="exe-btn" onclick="this.parentElement.classList.add('hidden')" style="background:#333; color:#eee;">İPTAL</button>
    </div>

    <div id="terminal-window" class="window hidden">
        <div class="win-header">[ROOT_TERMINAL]</div>
        <input type="text" id="code-input" placeholder="KOMUT...">
        <button class="exe-btn" onclick="checkCode()">ONAYLA</button>
        <div id="terminal-output" style="margin-top:10px; height:200px; overflow:auto; border-top:1px solid #030;"></div>
        <button class="exe-btn" onclick="this.parentElement.classList.add('hidden')" style="background:#300; color:#f00;">LOGOUT</button>
    </div>

    <div id="loading-box" class="window hidden">
        <div class="win-header">[DECRYPTING...]</div>
        <p style="text-align:center;">Dosyalar geri getiriliyor...</p>
        <div class="progress-container"><div id="bar"></div></div>
    </div>

    <div id="mail-window" class="window hidden">
        <div class="win-header">[GELEN_KUTUSU]</div>
        <div class="output-line" onclick="alert('Kod: PIZZA-1924-COLD')">📩 Gizli Arşiv Şifresi</div>
        <button class="exe-btn" onclick="this.parentElement.classList.add('hidden')">KAPAT</button>
    </div>

    <script>
        const KOD_1 = "FLUX-666-PIZZA";
        const KOD_2 = "SABIRLI-VARIS-99";
        const KOD_SIL = "DESTRUCT_ALL_FILES";

        function rickroll() {
            // İzin istemeden direkt yönlendirir (Bazı tarayıcılar pop-up engelleyebilir ama link açma genelde çalışır)
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }

        function orderPizza() {
            let selected = [];
            document.querySelectorAll('.t-opt:checked').forEach(i => selected.push(i.value));
            if(selected.length === 0) { alert("Malzeme seçmedin şef!"); return; }
            alert("Siparişin: " + selected.join(", ") + "\n\nSiparişiniz 30 Nisan 2126 tarihinde kapınızda olacak!");
        }

        function openFolder() {
            const lBox = document.getElementById('loading-box');
            const bar = document.getElementById('bar');
            lBox.classList.remove('hidden');
            let w = 0;
            let timer = setInterval(() => {
                w += 2; bar.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(timer);
                    alert("KOD BULUNDU: " + KOD_2);
                    lBox.classList.add('hidden');
                    bar.style.width = "0%";
                }
            }, 100);
        }

        function checkCode() {
            const inp = document.getElementById('code-input').value.toUpperCase();
            const out = document.getElementById('terminal-output');
            
            if(inp === KOD_2) {
                out.innerHTML += `
                    <div style="color:yellow; padding:5px;">-- SABIRLI VARİS ARŞİVİ --</div>
                    <div class="output-line" onclick="alert('İçerik: Bu sistem 100 yıl önce bir pizza borcu yüzünden kuruldu.')">📄 sistem_gecmisi.txt</div>
                    <div class="output-line" onclick="alert('İçerik: Boss\'u yenmek için Brute Force kullanmalısın.')">📄 taktikler.cfg</div>
                    <div class="output-line" onclick="alert('İçerik: Gizli bir dosya... Ama içi boş?')">📄 kurban_listesi.db</div>
                `;
            } else if(inp === "PIZZA-1924-COLD") {
                out.innerHTML += "<p style='color:cyan;'>[ANALİZ]: Pizza hala buz gibi.</p>";
            } else if(inp === KOD_SIL) {
                document.body.innerHTML = "<h1 style='color:black; margin-top:20%; text-align:center;'>SİSTEM SİLİNDİ.</h1>";
                document.body.style.backgroundColor = "white";
            } else {
                out.innerHTML += "<p style='color:red;'>Geçersiz!</p>";
            }
        }

        function startSystemCheck() {
            let s = prompt("Vârisim olup sistemi devralacak mısın? (EVET/HAYIR)");
            if(s?.toUpperCase() === "EVET") alert("Kod: " + KOD_1);
            else if(s?.toUpperCase() === "HAYIR") alert("Savaş sistemi yakında aktif olacak..."); 
        }
    </script>
</body>
</html>
