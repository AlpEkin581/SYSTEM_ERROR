<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEM_DİZİNİ_V5</title>
    <style>
        /* HACKER UI GÜNCELLEME - TÜM HATALAR GİDERİLDİ */
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        #desktop {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #001a00 0%, #000 100%);
            display: flex; flex-direction: column;
            padding: 40px; gap: 20px;
        }

        /* DEV İKONLAR */
        .hacker-icon {
            background: rgba(0, 30, 0, 0.3); border: 2px solid #030;
            color: #0f0; width: 160px; padding: 15px;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; transition: 0.2s; border-radius: 8px;
            outline: none;
        }
        .hacker-icon:hover { background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; }
        .emoji { font-size: 55px; pointer-events: none; }
        .label { font-size: 14px; font-weight: bold; margin-top: 10px; pointer-events: none; }

        /* PENCERE TASARIMI */
        .window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 3px solid #0f0; padding: 20px;
            z-index: 9999; width: 420px; max-width: 90%;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.4);
            box-sizing: border-box;
        }
        .win-header { background: #0f0; color: #000; font-weight: bold; padding: 8px; text-align: center; margin: -20px -20px 20px -20px; }
        
        /* E-POSTA STİLİ */
        .mail-list { max-height: 200px; overflow-y: auto; text-align: left; }
        .mail-item { border-bottom: 1px solid #030; padding: 10px; cursor: pointer; }
        .mail-item:hover { background: #010; color: #fff; }
        .mail-sender { font-weight: bold; color: yellow; font-size: 12px; }

        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .exe-btn { background: #0f0; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .progress-container { width: 100%; height: 20px; background: #001100; border: 1px solid #0f0; margin: 15px 0; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #0f0; }
        
        .hidden { display: none !important; }
        .close-btn { color: #f00; cursor: pointer; display: block; margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="desktop">
        <button class="hacker-icon" onclick="openFolder()">
            <span class="emoji">📁</span>
            <span class="label">NOTLAR.TXT</span>
        </button>

        <button class="hacker-icon" onclick="openMail()">
            <span class="emoji">📧</span>
            <span class="label">E-POSTA</span>
        </button>

        <button class="hacker-icon" onclick="openTerminal()">
            <span class="emoji">📟</span>
            <span class="label">TERMİNAL</span>
        </button>

        <button class="hacker-icon" onclick="startFinal()">
            <span class="emoji">⚠️</span>
            <span class="label">SİSTEM.EXE</span>
        </button>
    </div>

    <div id="loading-box" class="window hidden">
        <div class="win-header">[DECRYPTING_FILES]</div>
        <p style="text-align:center;">Arşiv çözülüyor... Lütfen bekleyin.</p>
        <div class="progress-container"><div id="bar"></div></div>
    </div>

    <div id="mail-window" class="window hidden">
        <div class="win-header">[GELEN_KUTUSU]</div>
        <div class="mail-list">
            <div class="mail-item" onclick="alert('KİM: Pizzacı\nKONU: Gecikme\n\nMesaj: Abi senin 100 yıl önceki pizza kapıda fosilleşmiş.')">
                <span class="mail-sender">Pizzacı:</span> Sipariş Hakkında
            </div>
            <div class="mail-item" onclick="alert('KİM: Sistem\nKONU: Gizli Veri\n\nMesaj: Yeni erişim kodun: PIZZA-1924-COLD')">
                <span class="mail-sender">Sistem:</span> [GİZLİ] Arşiv Kodu
            </div>
        </div>
        <span class="close-btn" onclick="document.getElementById('mail-window').classList.add('hidden')">[KAPAT]</span>
    </div>

    <div id="terminal-window" class="window hidden">
        <div class="win-header">[ROOT_TERMINAL]</div>
        <input type="text" id="code-input" placeholder="KOD_GİRİNİZ..." autocomplete="off">
        <button class="exe-btn" onclick="checkCode()">ONAYLA</button>
        <div id="terminal-output" style="margin-top:15px; max-height:100px; overflow-y:auto; font-size:12px;"></div>
        <span class="close-btn" onclick="document.getElementById('terminal-window').classList.add('hidden')">[LOGOUT]</span>
    </div>

    <script>
        const KOD_1 = "FLUX-666-PIZZA";
        const KOD_2 = "SABIRLI-VARIS-99";
        const KOD_3 = "PIZZA-1924-COLD";
        let timer;

        function openFolder() {
            const lBox = document.getElementById('loading-box');
            const bar = document.getElementById('bar');
            lBox.classList.remove('hidden');
            let w = 0;
            clearInterval(timer);
            timer = setInterval(() => {
                w += 2; bar.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(timer);
                    alert("GİZLİ KOD ÇÖZÜLDÜ: " + KOD_2);
                    lBox.classList.add('hidden');
                    bar.style.width = "0%";
                }
            }, 500);
        }

        function openMail() { document.getElementById('mail-window').classList.remove('hidden'); }
        function openTerminal() { document.getElementById('terminal-window').classList.remove('hidden'); }

        function checkCode() {
            const inp = document.getElementById('code-input').value.toUpperCase();
            const out = document.getElementById('terminal-output');
            if(inp === KOD_1) out.innerHTML += "<p style='color:yellow;'>[FLUX]: Kurban_01 verileri açıldı. (Mors: HELP)</p>";
            else if(inp === KOD_2) out.innerHTML += "<p style='color:cyan;'>[SABIR]: 100 yıllık pizza faturası bulundu.</p>";
            else if(inp === KOD_3) out.innerHTML += "<p style='color:white;'>[PIZZA]: Fosil analizi tamamlandı: %0 Tazelik.</p>";
            else out.innerHTML += "<p style='color:red;'>[HATA]: Erişim reddedildi.</p>";
            out.scrollTop = out.scrollHeight;
        }

        function startFinal() {
            let s = prompt("Vârisim olup sistemi devralacak mısın? (EVET/HAYIR)");
            if(s?.toUpperCase() === "EVET") {
                document.body.innerHTML = `<div style="background:#000; color:#0f0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;"><h1>[YETKİ_DEVREDİLDİ]</h1><p>KODUN: ${KOD_1}</p><button onclick="location.reload()" style="background:#0f0; border:none; padding:10px; cursor:pointer; margin-top:20px;">DÖN</button></div>`;
            }
        }
    </script>
</body>
</html>
